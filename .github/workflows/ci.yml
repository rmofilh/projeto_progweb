name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: fioeluz
          POSTGRES_PASSWORD: fioeluz_pass
          POSTGRES_DB: fioeluz_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - run: pip install -r backend/requirements.txt
      - run: ruff check backend/
      - run: mypy backend/ --exclude 'backend/.venv/'
      - run: pytest backend/
        env:
          DATABASE_URL: postgresql+asyncpg://fioeluz:fioeluz_pass@localhost:5432/fioeluz_test_db

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
        continue-on-error: false
      - run: npm run typecheck
        working-directory: frontend
        continue-on-error: false
      - run: npm test
        working-directory: frontend

  docker:
    if: github.ref == 'refs/heads/master'
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t fioeluz/api:latest -t fioeluz/api:${{ github.sha }} ./backend
      - run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
      - run: docker push fioeluz/api:latest
      - run: docker push fioeluz/api:${{ github.sha }}
