name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: fioeluz
          POSTGRES_PASSWORD: fioeluz_pass
          POSTGRES_DB: fioeluz_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - run: pip install -r backend/requirements.txt
      - run: ruff check backend/ && ruff format --check backend/
      - run: mypy backend/ --exclude 'backend/.venv/'
      - run: pytest --cov=backend --cov-fail-under=80 backend/
        env:
          DATABASE_URL: postgresql+asyncpg://fioeluz:fioeluz_pass@localhost:5432/fioeluz_test_db

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run typecheck
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
