schema: spec-driven

project:
  name: fio-e-luz

context:

  backend:
    framework: fastapi
    language: python
    database: postgresql

    requirements:
      - MUST use FastAPI as the backend framework
      - MUST use Pydantic v2 for strict data validation and typing
      - MUST use SQLModel (built on SQLAlchemy 2.0) as ORM
      - MUST use PostgreSQL as the primary database
      - MUST validate all request and response schemas using Pydantic
      - MUST generate OpenAPI schema automatically

  frontend:
    framework: nextjs
    router: app-router
    language: typescript
    styling: tailwindcss
    ui_library: shadcn-ui

    requirements:
      - MUST use Next.js with App Router
      - MUST use TypeScript in ALL files
      - MUST use TailwindCSS for styling
      - MUST use ONLY components from shadcn/ui ecosystem
      - MUST follow accessibility best practices (WCAG)

  orchestration:
    containerization: docker
    composition: docker-compose

    requirements:
      - MUST provide Dockerfile for backend
      - MUST provide Dockerfile for frontend
      - MUST provide docker-compose.yml
      - MUST ensure backend, frontend, and database communicate via Docker network

standards:

  architecture:
    - MUST follow Clean Architecture principles
    - MUST follow Domain-Driven Design (DDD)
    - MUST separate domain, application, and infrastructure layers

  typing:
    - MUST enforce strict typing end-to-end
    - MUST avoid use of "any" in TypeScript
    - MUST define explicit types for all API contracts

  api:
    - MUST follow RESTful conventions
    - MUST validate all inputs
    - MUST NOT expose internal domain models directly
    - MUST return standardized HTTP status codes

  specifications:
    - MUST use RFC 2119 keywords (MUST, SHOULD, MAY)
    - MUST define behavior using Given/When/Then format
    - MUST include at least one success scenario per spec
    - MUST include explicit error scenarios
    - MUST define observable behavior only (NOT implementation details)
    - MUST define API error responses explicitly (e.g., 400, 422, 500)

  frontend_behavior:
    - MUST display loading states during async operations
    - MUST disable user actions while requests are in progress
    - MUST provide clear visual feedback for success and error states

  pwa:
    - MUST implement Service Worker
    - MUST support offline mode
    - MUST cache user favorites locally
    - MUST use a stale-while-revalidate caching strategy

  security:
    - MUST use Magic Link authentication
    - MUST NOT implement password-based authentication
    - MUST validate all inputs on backend
    - MUST ensure HTTPS usage

  testing:
    - MUST include unit tests for use cases
    - MUST validate business rules
    - SHOULD include integration tests for API endpoints
