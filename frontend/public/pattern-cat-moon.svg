  <path d="M100 80 Q200 50 280 120 Q350 180 340 260 Q330 330 260 370 Q180 400 120 380 Q200 340 240 260 Q270 190 230 120 Q180 60 100 80Z" stroke-width="3"/>
  <!-- Moon inner detail lines -->
  <path d="M160 140 Q200 120 220 160" stroke-width="1.5"/>
