  <!-- Stars -->
  <circle cx="350" cy="100" r="4" fill="#000"/>
  <circle cx="400" cy="180" r="3" fill="#000"/>
  <circle cx="380" cy="300" r="3.5" fill="#000"/>
  <circle cx="420" cy="250" r="2" fill="#000"/>
  <circle cx="80" cy="200" r="3" fill="#000"/>
  <circle cx="60" cy="300" r="2.5" fill="#000"/>
  <!-- Cat silhouette sitting on moon -->
  <path d="M220 260 Q230 220 240 230 Q250 200 260 190 Q270 180 280 200 Q290 210 300 230 Q310 220 320 250 Q330 270 330 300 Q330 340 300 360 Q280 370 260 370 Q240 370 220 360 Q200 340 200 310 Q200 280 220 260Z" stroke-width="3"/>
