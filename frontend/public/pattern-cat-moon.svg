  <path d="M240 295 L200 290 M240 300 L200 305 M242 305 L205 315" stroke-width="1.5"/>
  <path d="M280 290 L310 285 M280 295 L310 290 M278 300 L308 308" stroke-width="1.5"/>
  <!-- Cat tail curling -->
  <path d="M200 340 Q180 350 160 330 Q140 310 150 280 Q155 265 170 270" stroke-width="3"/>
  <!-- Cat paws -->
  <path d="M230 365 Q225 375 230 380 Q235 375 235 365" stroke-width="2"/>
  <path d="M270 365 Q265 375 270 380 Q275 375 275 365" stroke-width="2"/>
</svg>
