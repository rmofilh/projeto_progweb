<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none" stroke="#000" stroke-width="1.5">
  <title>Caleidoscópio</title>
  <g transform="translate(250,250)">
    <!-- Background circle -->
    <circle cx="0" cy="0" r="240" stroke-width="3"/>
    <circle cx="0" cy="0" r="235" stroke-width="1"/>
    <!-- 8-fold symmetry pattern -->
    <g>
      <!-- Wedge pattern repeated 8 times -->
      <g id="wedge">
        <!-- Outermost arc details -->
        <path d="M0 -235 Q40 -200 50 -160" stroke-width="2"/>
        <path d="M50 -160 Q45 -130 30 -110" stroke-width="2"/>
        <path d="M30 -110 Q15 -95 0 -90" stroke-width="2"/>
        <!-- Decorative shapes in wedge -->
        <circle cx="20" cy="-180" r="15" stroke-width="2"/>
        <circle cx="20" cy="-180" r="8" stroke-width="1.5"/>
        <path d="M10 -200 Q25 -210 35 -195" stroke-width="2"/>
        <path d="M35 -195 Q40 -185 30 -175" stroke-width="1.5"/>
        <!-- Diamond shape -->
        <path d="M15 -145 L22 -135 L15 -125 L8 -135Z" stroke-width="2" fill="#000" fill-opacity="0.08"/>
        <!-- Small circles -->
        <circle cx="15" cy="-108" r="5" stroke-width="1.5" fill="#000" fill-opacity="0.15"/>
        <!-- Curved line -->
        <path d="M0 -100 Q20 -95 35 -105" stroke-width="1.5"/>
        <!-- Inner wedge detail -->
        <path d="M0 -80 Q15 -72 25 -80" stroke-width="1.5"/>
        <circle cx="12" cy="-65" r="4" stroke-width="1" fill="#000" fill-opacity="0.1"/>
      </g>
      <!-- Repeat wedge 8 times -->
      <use href="#wedge" transform="rotate(45)"/>
      <use href="#wedge" transform="rotate(90)"/>
      <use href="#wedge" transform="rotate(135)"/>
      <use href="#wedge" transform="rotate(180)"/>
      <use href="#wedge" transform="rotate(225)"/>
      <use href="#wedge" transform="rotate(270)"/>
      <use href="#wedge" transform="rotate(315)"/>
    </g>
    <!-- Concentric rings -->
    <circle cx="0" cy="0" r="60" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="55" stroke-width="1"/>
    <!-- Inner pattern -->
    <g stroke-width="2">
      <path d="M0 -60 L15 -25 L0 -10 L-15 -25Z" fill="#000" fill-opacity="0.08"/>
      <path d="M0 -60 L15 -25 L0 -10 L-15 -25Z" transform="rotate(45)" fill="#000" fill-opacity="0.08"/>
      <path d="M0 -60 L15 -25 L0 -10 L-15 -25Z" transform="rotate(90)" fill="#000" fill-opacity="0.08"/>
      <path d="M0 -60 L15 -25 L0 -10 L-15 -25Z" transform="rotate(135)" fill="#000" fill-opacity="0.08"/>
      <path d="M0 -60 L15 -25 L0 -10 L-15 -25Z" transform="rotate(180)" fill="#000" fill-opacity="0.08"/>
      <path d="M0 -60 L15 -25 L0 -10 L-15 -25Z" transform="rotate(225)" fill="#000" fill-opacity="0.08"/>
      <path d="M0 -60 L15 -25 L0 -10 L-15 -25Z" transform="rotate(270)" fill="#000" fill-opacity="0.08"/>
      <path d="M0 -60 L15 -25 L0 -10 L-15 -25Z" transform="rotate(315)" fill="#000" fill-opacity="0.08"/>
    </g>
    <!-- Decorative dots on outer ring -->
    <g fill="#000" fill-opacity="0.25">
      <circle cx="0" cy="-240" r="4"/>
      <circle cx="169.7" cy="-169.7" r="4"/>
      <circle cx="240" cy="0" r="4"/>
      <circle cx="169.7" cy="169.7" r="4"/>
      <circle cx="0" cy="240" r="4"/>
      <circle cx="-169.7" cy="169.7" r="4"/>
      <circle cx="-240" cy="0" r="4"/>
      <circle cx="-169.7" cy="-169.7" r="4"/>
    </g>
    <!-- Center rosette -->
    <circle cx="0" cy="0" r="10" stroke-width="2"/>
    <path d="M0 -10 Q5 0 0 10 Q-5 0 0 -10Z" fill="#000" fill-opacity="0.15"/>
    <path d="M0 -10 Q5 0 0 10 Q-5 0 0 -10Z" transform="rotate(90)" fill="#000" fill-opacity="0.15"/>
    <circle cx="0" cy="0" r="3" fill="#000" fill-opacity="0.3"/>
  </g>
</svg>
