<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none" stroke="#000" stroke-width="2">
  <title>Estrela Teia</title>
  <g transform="translate(250,250)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="230" stroke-width="3"/>
    <circle cx="0" cy="0" r="222" stroke-width="1.5"/>
    <!-- Outer star (12 points) -->
    <g stroke-width="2">
      <path d="M0 -222 L10 -70 L0 -50 L-10 -70Z" fill="#000" fill-opacity="0.06"/>
      <path d="M0 -222 L10 -70 L0 -50 L-10 -70Z" transform="rotate(30)"/>
      <path d="M0 -222 L10 -70 L0 -50 L-10 -70Z" transform="rotate(60)"/>
      <path d="M0 -222 L10 -70 L0 -50 L-10 -70Z" transform="rotate(90)"/>
      <path d="M0 -222 L10 -70 L0 -50 L-10 -70Z" transform="rotate(120)"/>
      <path d="M0 -222 L10 -70 L0 -50 L-10 -70Z" transform="rotate(150)"/>
      <path d="M0 -222 L10 -70 L0 -50 L-10 -70Z" transform="rotate(180)"/>
      <path d="M0 -222 L10 -70 L0 -50 L-10 -70Z" transform="rotate(210)"/>
      <path d="M0 -222 L10 -70 L0 -50 L-10 -70Z" transform="rotate(240)"/>
      <path d="M0 -222 L10 -70 L0 -50 L-10 -70Z" transform="rotate(270)"/>
      <path d="M0 -222 L10 -70 L0 -50 L-10 -70Z" transform="rotate(300)"/>
      <path d="M0 -222 L10 -70 L0 -50 L-10 -70Z" transform="rotate(330)"/>
    </g>
    <!-- Web strings from center to points -->
    <g stroke-width="1.5" stroke-opacity="0.4">
      <line x1="0" y1="0" x2="0" y2="-220"/>
      <line x1="0" y1="0" x2="110" y2="-190.5"/>
      <line x1="0" y1="0" x2="190.5" y2="-110"/>
      <line x1="0" y1="0" x2="220" y2="0"/>
      <line x1="0" y1="0" x2="190.5" y2="110"/>
      <line x1="0" y1="0" x2="110" y2="190.5"/>
      <line x1="0" y1="0" x2="0" y2="220"/>
      <line x1="0" y1="0" x2="-110" y2="190.5"/>
      <line x1="0" y1="0" x2="-190.5" y2="110"/>
      <line x1="0" y1="0" x2="-220" y2="0"/>
      <line x1="0" y1="0" x2="-190.5" y2="-110"/>
      <line x1="0" y1="0" x2="-110" y2="-190.5"/>
    </g>
    <!-- Concentric rings -->
    <circle cx="0" cy="0" r="180" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="0" cy="0" r="140" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="100" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="0" cy="0" r="60" stroke-width="2"/>
    <!-- Inner star (8 points) -->
    <path d="M0 -60 L12 -25 L0 -15 L-12 -25Z" fill="#000" fill-opacity="0.1"/>
    <path d="M0 -60 L12 -25 L0 -15 L-12 -25Z" transform="rotate(45)" fill="#000" fill-opacity="0.1"/>
    <path d="M0 -60 L12 -25 L0 -15 L-12 -25Z" transform="rotate(90)" fill="#000" fill-opacity="0.1"/>
    <path d="M0 -60 L12 -25 L0 -15 L-12 -25Z" transform="rotate(135)" fill="#000" fill-opacity="0.1"/>
    <path d="M0 -60 L12 -25 L0 -15 L-12 -25Z" transform="rotate(180)" fill="#000" fill-opacity="0.1"/>
    <path d="M0 -60 L12 -25 L0 -15 L-12 -25Z" transform="rotate(225)" fill="#000" fill-opacity="0.1"/>
    <path d="M0 -60 L12 -25 L0 -15 L-12 -25Z" transform="rotate(270)" fill="#000" fill-opacity="0.1"/>
    <path d="M0 -60 L12 -25 L0 -15 L-12 -25Z" transform="rotate(315)" fill="#000" fill-opacity="0.1"/>
    <!-- Decorative diamonds on outer ring -->
    <g fill="#000" fill-opacity="0.15">
      <path d="M0 -230 L6 -222 L0 -214 L-6 -222Z"/>
      <path d="M0 -230 L6 -222 L0 -214 L-6 -222Z" transform="rotate(30)"/>
      <path d="M0 -230 L6 -222 L0 -214 L-6 -222Z" transform="rotate(60)"/>
      <path d="M0 -230 L6 -222 L0 -214 L-6 -222Z" transform="rotate(90)"/>
      <path d="M0 -230 L6 -222 L0 -214 L-6 -222Z" transform="rotate(120)"/>
      <path d="M0 -230 L6 -222 L0 -214 L-6 -222Z" transform="rotate(150)"/>
      <path d="M0 -230 L6 -222 L0 -214 L-6 -222Z" transform="rotate(180)"/>
      <path d="M0 -230 L6 -222 L0 -214 L-6 -222Z" transform="rotate(210)"/>
      <path d="M0 -230 L6 -222 L0 -214 L-6 -222Z" transform="rotate(240)"/>
      <path d="M0 -230 L6 -222 L0 -214 L-6 -222Z" transform="rotate(270)"/>
      <path d="M0 -230 L6 -222 L0 -214 L-6 -222Z" transform="rotate(300)"/>
      <path d="M0 -230 L6 -222 L0 -214 L-6 -222Z" transform="rotate(330)"/>
    </g>
    <!-- Center -->
    <circle cx="0" cy="0" r="15" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="5" fill="#000" fill-opacity="0.3"/>
  </g>
</svg>
